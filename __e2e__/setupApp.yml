appId: xyz.blueskyweb.app
---
- launchApp:
    appId: "xyz.blueskyweb.app"
    clearState: true
    arguments:
      "-EXDevMenuIsOnboardingFinished": true
- runFlow:
    when:
      platform: iOS
    commands:
      - openLink: "exp+bluesky://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081"
      - runFlow:
          when:
            visible: 'Open in "Bluesky"'
          commands:
            - tapOn: Open
- runFlow:
    when:
      platform: Android
    commands:
      - openLink: "exp+bluesky://expo-development-client/?url=http%3A%2F%2F10.0.2.2%3A8081"
      - runFlow:
          label: "Dismiss Expo dev menu"
          when:
            visible: "Continue"
          commands:
            - back
- extendedWaitUntil:
    visible:
      id: e2eProxyHeaderInput
    timeout: 60000
- tapOn:
    id: e2eProxyHeaderInput
- inputText: ${output.result}
- pressKey: Enter
