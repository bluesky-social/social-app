appId: xyz.blueskyweb.app
---
- runScript:
    file: ../setupServer.js
    env:
      SERVER_PATH: "?users"
- runFlow:
    file: ../setupApp.yml
- tapOn:
    id: "e2eSignInAlice"

# Navigate to another user profile via autocomplete
- extendedWaitUntil:
    visible:
      id: "bottomBarSearchBtn"
- tapOn:
    id: "bottomBarSearchBtn"
- assertVisible:
    id: "searchScreenInput"
- tapOn:
    id: "searchScreenInput"
- inputText: "b"
- tapOn:
    id: "searchAutoCompleteResult-bob.test"
- assertVisible:
    id: "profileView"
