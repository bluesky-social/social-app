appId: xyz.blueskyweb.app
---
- runScript:
    file: ../setupServer.js
    env:
        SERVER_PATH: ?users&follows&posts&feeds
- runFlow:
    file: ../setupApp.yml
- tapOn:
    id: "e2eSignInAlice"

# Pin alice's feed
- extendedWaitUntil:
    visible: "Open drawer menu"
- tapOn: "Open drawer menu"
- tapOn:
    id: "profileCardButton"
- tapOn:
    id: "profilePager-selector-5"
- tapOn: "alice-favs"
- tapOn: "Pin to Home"
- tapOn:
    id: "bottomBarHomeBtn"
- assertNotVisible: "Feeds ✨"
- assertVisible:
    id: "homeScreenFeedTabs-selector-0"
    text: "Following"
- assertVisible:
    id: "homeScreenFeedTabs-selector-1"
    text: "alice-favs"

# Set alice-favs first
- tapOn: "Open drawer menu"
- tapOn:
    id: "menuItemButton-Feeds"
- tapOn:
    id: "editFeedsBtn"
# The id+direction swipe doesn't register the RNGH pan on Android, so we
# use an explicit coordinate swipe that travels several row heights. iOS
# keeps the id-based swipe (its screen aspect ratio differs).
- runFlow:
    when:
      platform: iOS
    commands:
      - swipe:
          label: "Drag feed down"
          from:
            id: "feed-drag-handle"
          direction: "DOWN"
          duration: 1000
- runFlow:
    when:
      platform: Android
    commands:
      - swipe:
          label: "Drag feed down"
          start: "93%,31%"
          end: "93%,45%"
          duration: 1500
- assertVisible:
    id: "saveChangesBtn"
    enabled: true
- tapOn:
      label: "Save button"
      id: "saveChangesBtn"
- tapOn: "Go back"
- assertVisible:
    id: "homeScreenFeedTabs-selector-0"
    text: "alice-favs"
- assertVisible:
    id: "homeScreenFeedTabs-selector-1"
    text: "Following"

# Set following first
- tapOn: "Open drawer menu"
- tapOn:
    id: "menuItemButton-Feeds"
- tapOn:
    id: "editFeedsBtn"
- runFlow:
    when:
      platform: iOS
    commands:
      - swipe:
          label: "Drag feed down"
          from:
            id: "feed-drag-handle"
          direction: "DOWN"
          duration: 1000
- runFlow:
    when:
      platform: Android
    commands:
      - swipe:
          label: "Drag feed down"
          start: "93%,31%"
          end: "93%,45%"
          duration: 1500
- assertVisible:
    id: "saveChangesBtn"
    enabled: true
- tapOn:
    label: "Save button"
    id: "saveChangesBtn"
- tapOn: "Go back"
- assertVisible:
    id: "homeScreenFeedTabs-selector-0"
    text: "Following"
- assertVisible:
    id: "homeScreenFeedTabs-selector-1"
    text: "alice-favs"

# Remove following
- tapOn: "Open drawer menu"
- tapOn:
    id: "menuItemButton-Feeds"
- tapOn:
    id: "editFeedsBtn"
- tapOn:
    label: "Tap on unpin"
    id: "feed-timeline-togglePin"
- tapOn:
      label: "Save button"
      id: "saveChangesBtn"
- tapOn: "Go back"
- assertVisible:
    id: "homeScreenFeedTabs-selector-0"
    text: "alice-favs"
- assertNotVisible: "Following"
