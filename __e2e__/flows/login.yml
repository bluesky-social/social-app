appId: xyz.blueskyweb.app
---
- runScript:
    file: ../setupServer.js
    env:
        SERVER_PATH: "?users"
- runFlow:
    file: ../setupApp.yml
- tapOn:
    id: "e2eOpenLoggedOutView"
- tapOn: "Sign in"
- tapOn:
    id: "selectServiceButton"
- tapOn: "Custom"
- tapOn:
    id: "customServerTextInput"
- inputText: "http://localhost:3000"
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- tapOn: "Done"
- tapOn:
    id: "loginUsernameInput"
- inputText: "Alice"
- tapOn:
    id: "loginPasswordInput"
- inputText: "hunter2"
- pressKey: Enter
- tapOn:
    text: "Not Now"
    optional: true
- assertVisible: "Following"
