appId: xyz.blueskyweb.app
---
- runScript:
    file: ../setupServer.js
    env:
      SERVER_PATH: "?users"
- runFlow:
    file: ../setupApp.yml
- tapOn:
    id: "e2eSignInAlice"
- extendedWaitUntil:
    visible:
      id: "viewHeaderHomeFeedPrefsBtn"

- tapOn:
    id: "e2eStartOnboarding"
- tapOn: "Open avatar creator"
# The avatar-creator bottom sheet opens as a sliver on the short E2E emulator
# (720x1600), so the picker content sits below the fold. Scroll it into view
# instead of just waiting. No-op on iOS, where it is already visible.
- scrollUntilVisible:
    element:
      text: "Select an emoji"
    direction: DOWN
    timeout: 15000
- tapOn: "Select the zap emoji as your avatar"
- tapOn:
    label: "Tap on yellow"
    point: "23%,79%"
- tapOn: "Done"
- waitForAnimationToEnd
- tapOn: "Select an avatar"
- tapOn: "Select the atom emoji as your avatar"
- tapOn: "Done"
- waitForAnimationToEnd
- tapOn:
    id: "onboardingContinue"
- assertVisible: "What are your interests?"
- tapOn:
    id: "onboardingContinue"
- assertVisible: "Suggested for you"
# mock server doesn't have suggestions api
- tapOn: "Skip to next step"
- swipe:
    direction: "LEFT"
- swipe:
    direction: "LEFT"
- assertVisible: "Complete onboarding and start using your account"
- tapOn:
    id: "onboardingFinish"
- tapOn:
    label: "NUX, if applicable"
    text: "Close"
    optional: true
- waitForAnimationToEnd
- assertVisible: "Following"
