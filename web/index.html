<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <!-- BRAND-GEN:theme-color start - brand-colors.json defaultAccent primary_500 (run `pnpm brand:sync-web`) -->
    <meta name="theme-color" content="#DB4AA6">
    <!-- BRAND-GEN:theme-color end -->
    <!--
      This viewport works for phones with notches.
      It's optimized for gestures by disabling global zoom.
     -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover"
    />
    <!--
      Preconnect to essential domains
    -->
    <link rel="preconnect" href="https://bsky.social">
    <link rel="preconnect" href="https://go.bsky.app">
    <title>%WEB_TITLE%</title>

    <!--
      mu fork: DEFAULT (fallback) Open Graph / Twitter card metadata for link
      unfurls. This is a static SPA (no per-route SSR), so this default card is
      what shows on the homepage, unmatched routes, and any time the edge
      injector is unavailable. Per-route cards for /profile and /post are added
      at the Bunny edge by ../services/og/, which strips and replaces these tags;
      keep them here as the fallback. og:image MUST be an absolute URL;
      og-image.jpg is copied from this web/ folder to the build root at deploy.
      Keep the dimensions in sync with the file (assets/og-image.jpg, 2400x1600).
    -->
    <!-- BRAND-GEN:meta start - brand-meta.json name/host (run `pnpm brand:sync-web`) -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="mu">
    <meta property="og:title" content="mu">
    <meta property="og:url" content="https://mu.social">
    <meta property="og:image" content="https://mu.social/og-image.jpg">
    <meta property="og:image:width" content="2400">
    <meta property="og:image:height" content="1600">
    <meta property="og:image:alt" content="mu">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="mu">
    <meta name="twitter:image" content="https://mu.social/og-image.jpg">
    <!-- BRAND-GEN:meta end -->

    <link rel="preload" as="font" type="font/woff2" href="/static/media/InterVariable.c504db5c06caaf7cdfba.woff2" crossorigin>
    <link rel="stylesheet" href="/static/style.css">

    <style>
      /**
       * Minimum styles required to render splash.
       *
       * ALL OTHER STYLES BELONG IN `src/style.css`
       *
       * THIS NEEDS TO BE DUPLICATED IN `bskyweb/templates/base.html`
       */
      @font-face {
        font-family: 'InterVariable';
        src: url(/static/media/InterVariable.c504db5c06caaf7cdfba.woff2) format('woff2');
        font-weight: 300 1000;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'InterVariableItalic';
        src: url(/static/media/InterVariable-Italic.01dcbad1bac635f9c9cd.woff2) format('woff2');
        font-weight: 300 1000;
        font-style: italic;
        font-display: swap;
      }
      html,
      body {
        margin: 0px;
        padding: 0px;
        font-family: InterVariable, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Liberation Sans', Helvetica, Arial, sans-serif;
        text-rendering: optimizeLegibility;
        /* Platform-specific reset */
        -webkit-overflow-scrolling: touch;
        -webkit-text-size-adjust: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -ms-overflow-style: scrollbar;
        font-synthesis-weight: none;
      }
      /*
       * mu: these MUST match ALF's t.atoms.bg / text (from
       * src/config/brand-theme.ts). ALF bg = palette.contrast_0,
       * text = palette.contrast_1000; dark = invert(BRAND_PALETTE),
       * dim = invert(BRAND_SUBDUED_PALETTE). Mismatch = a seam where the
       * body bg peeks past the app (header, overscroll, gutters).
       *   light bg #FFFFFF | dark bg #000000 | dim bg #1A1A1A
       * Keep in sync if the ramp anchors change there.
       */
      /* BRAND-GEN:colors start - generated from src/config/brand-colors.json by scripts/sync-brand-web.mjs (run `pnpm brand:sync-web`; do not hand-edit) */
      :root {
        --text: #212121;
        --background: #FFFFFF;
        --backgroundLight: #F7F7F2;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --text: #F7F7F2;
          --background: #000000;
          --backgroundLight: #212121;
        }
      }
      html,
      body,
      #root {
        display: flex;
        flex: 1 0 auto;
        min-height: 100%;
        width: 100%;
      }
      html.theme--light,
      html.theme--light body,
      html.theme--light #root {
        background-color: #FFFFFF;
        --text: #212121;
        --background: #FFFFFF;
        --backgroundLight: #F7F7F2;
      }
      html.theme--dark,
      html.theme--dark body,
      html.theme--dark #root {
        color-scheme: dark;
        background-color: #000000;
        --text: #F7F7F2;
        --background: #000000;
        --backgroundLight: #212121;
      }
      html.theme--dim,
      html.theme--dim body,
      html.theme--dim #root {
        color-scheme: dark;
        background-color: #1A1A1A;
        --text: #F7F7F2;
        --background: #1A1A1A;
        --backgroundLight: #242424;
      }
      /* BRAND-GEN:colors end */
      #splash {
        display: flex;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        align-items: center;
        justify-content: center;
      }
      #splash svg {
        position: relative;
        top: -50px;
        width: 100px;
      }
      /**
       * We need these styles to prevent shifting due to scrollbar show/hide on
       * OSs that have them enabled by default. This also handles cases where the
       * screen wouldn't otherwise scroll, and therefore hide the scrollbar and
       * shift the content, by forcing the page to show a scrollbar.
       */
      body {
        width: 100%;
        overflow-y: scroll;
      }
    </style>
    <script>
      const theme = localStorage.getItem('ALF_THEME')
      if (theme) {
        document.documentElement.classList.add(`theme--${theme}`)
      }
    </script>
  </head>

  <body>
    <!--
      A generic no script element with a reload button and a message.
      Feel free to customize this however you'd like.
    -->
    <noscript>
      <form
        action=""
        style="
          background-color: #fff;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          z-index: 9999;
        "
      >
        <div
          style="
            font-size: 18px;
            font-family: Helvetica, sans-serif;
            line-height: 24px;
            margin: 10%;
            width: 80%;
          "
        >
          <p lang="en">Oh no! It looks like JavaScript is not enabled in your browser.</p>
          <p lang="en" style="margin: 20px 0;">
            <button
              type="submit"
              style="
                background-color: #4630eb;
                border-radius: 100px;
                border: none;
                box-shadow: none;
                color: #fff;
                cursor: pointer;
                font-weight: bold;
                line-height: 20px;
                padding: 6px 16px;
              "
            >
              Reload
            </button>
          </p>
        </div>
      </form>
    </noscript>

    <!-- The root element for your Expo app. -->
