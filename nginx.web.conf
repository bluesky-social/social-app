server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA/PWA routing: serve index.html for unknown paths
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache immutable assets (adjust path if your build outputs elsewhere)
  location /static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Basic compression
  gzip on;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    application/manifest+json
    image/svg+xml
    application/xml
    text/xml
    font/woff2;

  # Don’t cache HTML
  location = /index.html {
    add_header Cache-Control "no-store";
  }
}