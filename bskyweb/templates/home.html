{% extends "base.html" %}

{% block head_title %}{{ brand.Name }}{% endblock %}

{% block html_head_extra -%}
  <meta property="og:title" content="{{ brand.Name }}" />
  <meta name="twitter:title" content="{{ brand.Name }}" />

  <meta name="description" content="{{ brand.Description }}" />
  <meta name="og:description" content="{{ brand.Description }}" />
  <meta name="twitter:description" content="{{ brand.Description }}" />

  {%- if brand.CanonicalHost %}
  <meta property="og:url" content="https://{{ brand.CanonicalHost }}" />
  <meta name="twitter:url" content="https://{{ brand.CanonicalHost }}" />
  <link rel="canonical" href="https://{{ brand.CanonicalHost }}" />
  {% endif -%}

  {%- if brand.DefaultOGImage %}
  <meta property="og:image" content="{{ brand.DefaultOGImage }}" />
  <meta property="twitter:image" content="{{ brand.DefaultOGImage }}"  />
  <meta name="twitter:card" content="summary_large_image" />
  {% endif -%}
{%- endblock %}

{% block noscript_extra %}
<p>This is the home page.
{% endblock %}
