<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover">
  <meta name="referrer" content="origin-when-cross-origin">
  <!--
    Preconnect to essential domains
  -->
  <link rel="preconnect" href="{{ brandDomain }}">
  <link rel="preconnect" href="{{ brandShortlink }}">
  <title>{%- block head_title -%}{{ brandTitle }}{%- endblock -%}</title>

  <!-- Hello Humans! API docs at https://atproto.com -->

  <link rel="preload" as="font" type="font/woff2" href="{{ staticCDNHost }}/static/media/InterVariable.c504db5c06caaf7cdfba.woff2" crossorigin>

  <style>
    /**
     * Minimum styles required to render splash.
     *
     * ALL OTHER STYLES BELONG IN `src/style.css`
     *
     * THIS NEEDS TO BE DUPLICATED IN `bskyweb/templates/base.html`
     */
    @font-face {
      font-family: 'InterVariable';
      src: url("{{ staticCDNHost }}/static/media/InterVariable.c504db5c06caaf7cdfba.woff2") format('woff2');
      font-weight: 300 1000;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'InterVariableItalic';
      src: url("{{ staticCDNHost }}/static/media/InterVariable-Italic.01dcbad1bac635f9c9cd.woff2") format('woff2');
      font-weight: 300 1000;
      font-style: italic;
      font-display: swap;
    }
    html {
      --brand-bg-light: {{ brandBgLight }};
      --brand-bg-dark: {{ brandBgDark }};
      --brand-bg-dim: {{ brandBgDim }};
      --brand-selection-light: {{ brandSelectionLight }};
      --brand-selection-dark: {{ brandSelectionDark }};
      --brand-hue: {{ brandHue }};
      background-color: var(--brand-bg-light);
      color: #000000;
    }
    @media (prefers-color-scheme: dark) {
      html {
        background-color: var(--brand-bg-dark);
        color: #FFFFFF;
      }
    }
    html,
    body {
      margin: 0px;
      padding: 0px;
      font-family: InterVariable, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Liberation Sans', Helvetica, Arial, sans-serif;
      text-rendering: optimizeLegibility;
      /* Platform-specific reset */
      -webkit-overflow-scrolling: touch;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -ms-overflow-style: scrollbar;
      font-synthesis-weight: none;
    }
    html,
    body,
    #root {
      display: flex;
      flex: 1 0 auto;
      min-height: 100%;
      width: 100%;
    }
    #splash {
      position: fixed;
      width: 100px;
      left: 50%;
      top: 50%;
      transform: translateX(-50%) translateY(-50%) translateY(-50px);
    }
    /**
     * We need these styles to prevent shifting due to scrollbar show/hide on
     * OSs that have them enabled by default. This also handles cases where the
     * screen wouldn't otherwise scroll, and therefore hide the scrollbar and
     * shift the content, by forcing the page to show a scrollbar.
     */
    body {
      width: 100%;
      overflow-y: scroll;
    }
  </style>

  {% include "scripts.html" %}
  <link rel="apple-touch-icon" sizes="180x180" href="{{ appleTouchIcon }}">
  <link rel="icon" sizes="32x32" href="{{ favicon }}">
  <link rel="icon" sizes="16x16" href="{{ favicon }}">
  <link rel="manifest" href="/manifest.json">
  <link rel="mask-icon" href="{{ staticCDNHost }}/static/safari-pinned-tab.svg" color="{{ brandThemeColor }}">
  <meta name="theme-color" content="{{ brandThemeColor }}">
  <meta name="application-name" content="{{ brandName }}">
  {% if noindex %}<meta name="robots" content="noindex{% if nofollow %}, nofollow{% endif %}">{% endif %}
  <meta name="generator" content="bskyweb">
  <meta property="og:site_name" content="{{ brandName }}">
  <meta property="og:logo" content="{{ favicon }}">
  <meta name="twitter:site" content="{{ brandTwitterSite }}" />
  <link type="application/activity+json" href="" />

  {% if brandConfigJSON %}
  <script>
    window.__BRAND_CONFIG__ = {{ brandConfigJSON|safe }};
  </script>
  {% endif %}

  {% block html_head_extra -%}{%- endblock %}
</head>
<body>
{%- block body_all %}
  <div id="splash">
    <picture>
      <source srcset="{{ brandLogoDark }}" media="(prefers-color-scheme: dark)">
      <img src="{{ brandLogoLight }}" alt="{{ brandName }}" style="width:100%;height:auto;display:block" onerror="this.onerror=null;this.src='{{ staticCDNHost }}/static/logo-light.png'">
    </picture>
  </div>
  <div id="root"></div>

  <noscript>
    <h1 lang="en">JavaScript Required</h1>
    <p lang="en">This is a heavily interactive web application, and JavaScript is required. Simple HTML interfaces are possible, but that is not what this is.
    <p lang="en">Learn more about {{ brandName }} at <a href="{{ brandDomain }}">{{ brandDomain }}</a> and <a href="https://atproto.com">atproto.com</a>.</p>
    {% block noscript_extra %}{% endblock %}
  </noscript>
{% endblock -%}
</body>
</html>
