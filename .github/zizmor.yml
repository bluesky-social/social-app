# zizmor configuration
# https://docs.zizmor.sh/configuration/

rules:
  # nightly-build.yml passes `secrets: inherit` to same-repo reusable
  # workflows (build-submit-ios.yml / build-submit-android.yml). This is an
  # upstream pattern for trusted first-party reusable workflows and is
  # intentional, so the finding is not actionable here.
  secrets-inherit:
    ignore:
      - nightly-build.yml

  # build-submit-android.yml uses softprops/action-gh-release to attach the
  # APK to a release. zizmor suggests `gh release` in a script step instead;
  # this is an upstream choice and only an informational suggestion.
  superfluous-actions:
    ignore:
      - build-submit-android.yml

  # Upstream pins bluesky-social/github-actions/fingerprint-native to a SHA
  # whose `# v0.1.0` version comment does not match the pinned commit. This is
  # upstream's own pin in upstream-maintained workflows; not actionable in the
  # fork. (The rule stays active for our own pinned actions.)
  ref-version-mismatch:
    ignore:
      - bundle-deploy-eas-update.yml
      - pull-request-commit.yml
