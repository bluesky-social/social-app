name: Build Web (PWA) Docker image (Manual)

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: Docker image name (local only)
        type: string
        default: protosky-web
      tag:
        description: Tag (leave blank to use short SHA)
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute tag
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="$SHORT_SHA"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build Docker image (web)
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build -f Dockerfile.web -t "${IMAGE_NAME}:${TAG}" .

      - name: Save image as artifact
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          OUT="${IMAGE_NAME}-${TAG}.tar.gz"
          docker save "${IMAGE_NAME}:${TAG}" | gzip > "$OUT"
          sha256sum "$OUT" > "${OUT}.sha256"
          echo "artifact_name=${IMAGE_NAME}-${TAG}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.artifact_name }}
          path: |
            ${{ env.artifact_name }}.tar.gz
            ${{ env.artifact_name }}.tar.gz.sha256
          retention-days: 14