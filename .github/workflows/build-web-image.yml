name: Docker Image CI (Artifact only)

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: Image name (at ghcr.io/<owner>/<image_name>)
        type: string
        default: protosky-web
      tag:
        description: Protosky-web docker container
        type: string
        default: ""

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: meta
        shell: bash
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="${{ inputs.image_name }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG_IN="${{ inputs.tag }}"
          TAG="${TAG_IN:-$SHORT_SHA}"
          GHCR_IMAGE="ghcr.io/${OWNER_LC}/${IMAGE_NAME}"
          echo "owner_lc=$OWNER_LC"       >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                 >> "$GITHUB_OUTPUT"
          echo "ghcr_image=$GHCR_IMAGE"   >> "$GITHUB_OUTPUT"
          echo "ghcr_tag=${GHCR_IMAGE}:${TAG}"     >> "$GITHUB_OUTPUT"
          echo "ghcr_latest=${GHCR_IMAGE}:latest"  >> "$GITHUB_OUTPUT"

      - name: Build image (Dockerfile.web)
        run: |
          docker build -f Dockerfile.web \
            -t "${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.tag }}" \
            -t "${{ steps.meta.outputs.ghcr_tag }}" \
            -t "${{ steps.meta.outputs.ghcr_latest }}" \
            .

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Push to GHCR
        run: |
          docker push "${{ steps.meta.outputs.ghcr_tag }}"
          docker push "${{ steps.meta.outputs.ghcr_latest }}"
          {
            echo "Pushed:"
            echo "  ${{ steps.meta.outputs.ghcr_tag }}"
            echo "  ${{ steps.meta.outputs.ghcr_latest }}"
            echo ""
            echo "Pull on your host:"
            echo "  docker pull ${{ steps.meta.outputs.ghcr_tag }}"
            echo "  docker run --rm -p 8080:80 ${{ steps.meta.outputs.ghcr_tag }}"
          } >> "$GITHUB_STEP_SUMMARY"