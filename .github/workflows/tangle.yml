name: Mirror to forge.blacksky.community

on:
  push: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  tangle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: push to forge knot
        env:
          TANGLED_KEY: ${{ secrets.TANGLED_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$TANGLED_KEY" > ~/.ssh/tangled_key
          chmod 600 ~/.ssh/tangled_key
          cat > ~/.ssh/config <<'EOF'
          Host knot.blacksky.community
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
            IdentityFile ~/.ssh/tangled_key
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config
          git fetch --tags origin
          git remote add tangled git@knot.blacksky.community:blackskyweb.xyz/blacksky.community
          git push --mirror tangled
