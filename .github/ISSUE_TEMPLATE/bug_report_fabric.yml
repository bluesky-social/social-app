name: Crash Report
description: Report a crash or serious runtime issue in CoSeeker
title: "[Crash]: "
labels:

* bug
  body:

* type: markdown
  attributes:
  value: |
  Use this template to report crashes, serious runtime failures, or app-breaking issues in CoSeeker.

  ```
  Please include as much detail as possible so maintainers and contributors can reproduce and debug the issue.
  ```

* type: textarea
  id: what-happened
  attributes:
  label: What happened?
  description: Describe the crash or serious issue.
  placeholder: Explain what happened before, during, and after the crash.
  validations:
  required: true

* type: textarea
  id: steps-to-reproduce
  attributes:
  label: Steps to reproduce
  description: List the exact steps that triggered the crash.
  value: |
  1.
  2.
  3.
  validations:
  required: true

* type: textarea
  id: expected-behavior
  attributes:
  label: Expected behavior
  description: What did you expect to happen instead?
  placeholder: Explain the expected result.
  validations:
  required: true

* type: input
  id: device
  attributes:
  label: Device
  description: What device were you using?
  placeholder: iPhone 15, Pixel 8, MacBook, Windows laptop, etc.
  validations:
  required: false

* type: input
  id: operating-system
  attributes:
  label: Operating system
  description: What operating system were you using?
  placeholder: iOS 18, Android 15, macOS, Windows, etc.
  validations:
  required: false

* type: input
  id: app-version
  attributes:
  label: App version or branch
  description: What app version, branch, or commit were you using?
  placeholder: main, latest build, commit hash, etc.
  validations:
  required: false

* type: textarea
  id: logs
  attributes:
  label: Logs or error messages
  description: Paste relevant logs, crash output, terminal errors, or stack traces.
  render: shell
  validations:
  required: false

* type: textarea
  id: screenshots
  attributes:
  label: Screenshots or recordings
  description: Add screenshots or screen recordings if useful.
  placeholder: Drag and drop files here.
  validations:
  required: false

* type: dropdown
  id: affected-platform
  attributes:
  label: Affected platform
  description: Where did this crash happen?
  options:
  - iOS
  - Android
  - Web
  - Local development
  - Unknown
  validations:
  required: false

* type: textarea
  id: additional-context
  attributes:
  label: Additional context
  description: Add any other relevant details.
  placeholder: Related issues, recent changes, suspected cause, or other context.
  validations:
  required: false
