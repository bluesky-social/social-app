name: Bug Report
description: Report something that is broken or not working correctly in K4M2A/CoSeeker
title: "[Bug]: "
labels:

* bug
  body:

* type: markdown
  attributes:
  value: |
  Use this template to report something that is broken, confusing, incorrect, or not working as expected in K4M2A/CoSeeker.

  ```
  Please include clear steps so contributors and maintainers can reproduce the issue.
  ```

* type: textarea
  id: what-happened
  attributes:
  label: What happened?
  description: Describe the bug clearly.
  placeholder: Explain what went wrong.
  validations:
  required: true

* type: textarea
  id: expected-behavior
  attributes:
  label: Expected behavior
  description: What did you expect to happen?
  placeholder: Explain what should have happened instead.
  validations:
  required: true

* type: textarea
  id: actual-behavior
  attributes:
  label: Actual behavior
  description: What actually happened?
  placeholder: Explain the actual result, error, broken screen, or confusing behavior.
  validations:
  required: true

* type: textarea
  id: steps-to-reproduce
  attributes:
  label: Steps to reproduce
  description: List the exact steps needed to reproduce the issue.
  value: |
  1.
  2.
  3.
  validations:
  required: true

* type: textarea
  id: screenshots
  attributes:
  label: Screenshots or screen recording
  description: Add screenshots or a screen recording if useful.
  placeholder: Drag and drop images or recordings here.
  validations:
  required: false

* type: input
  id: device
  attributes:
  label: Device
  description: What device were you using?
  placeholder: iPhone 15, Pixel 8, MacBook, Windows laptop, etc.
  validations:
  required: false

* type: input
  id: operating-system
  attributes:
  label: Operating system
  description: What operating system were you using?
  placeholder: iOS 18, Android 15, macOS, Windows, etc.
  validations:
  required: false

* type: input
  id: app-version
  attributes:
  label: App version or branch
  description: What app version, branch, or commit were you using?
  placeholder: main, latest build, commit hash, etc.
  validations:
  required: false

* type: input
  id: browser
  attributes:
  label: Browser, if relevant
  description: Add browser details if this issue happened on web.
  placeholder: Chrome, Safari, Firefox, Edge, etc.
  validations:
  required: false

* type: dropdown
  id: issue-area
  attributes:
  label: Area of the app
  description: Which part of CoSeeker is affected?
  options:
  - Onboarding
  - Login / signup
  - Email verification
  - Home feed
  - Search
  - Profile
  - Settings
  - Notifications
  - Moderation / reporting
  - Spam / bot accounts
  - Branding / copy
  - Documentation
  - Other
  validations:
  required: false

* type: textarea
  id: possible-cause
  attributes:
  label: Possible cause
  description: If you have an idea of what might be causing this, write it here.
  placeholder: Optional.
  validations:
  required: false

* type: textarea
  id: additional-context
  attributes:
  label: Additional context
  description: Add any other relevant details.
  placeholder: Links, related issues, logs, examples, or other context.
  validations:
  required: false
