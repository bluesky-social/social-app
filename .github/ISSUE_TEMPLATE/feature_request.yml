name: Feature Request
description: Suggest a new feature or improvement for K4M2A/CoSeeker
title: "[Feature]: "
labels:

* enhancement

* product-thinking
  body:

* type: markdown
  attributes:
  value: |
  Use this template to suggest a new feature, product improvement, or user experience change for CoSeeker.

  ```
  CoSeeker is being developed as part of K4M2A. Feature requests should support reflection, learning, community, safety, inner transformation, or human development.
  ```

* type: textarea
  id: problem
  attributes:
  label: Problem
  description: What problem does this feature solve?
  placeholder: Describe the user problem, community need, safety issue, or contributor problem.
  validations:
  required: true

* type: textarea
  id: proposed-solution
  attributes:
  label: Proposed solution
  description: Describe the feature or improvement you want.
  placeholder: Explain what should be added, changed, removed, or redesigned.
  validations:
  required: true

* type: textarea
  id: why-this-matters
  attributes:
  label: Why this matters for CoSeeker / K4M2A
  description: Explain how this supports the mission of CoSeeker or K4M2A.
  placeholder: |
  Examples:
  - Helps seekers find better communities
  - Improves safety or moderation
  - Reduces engagement-driven behavior
  - Improves reflection, learning, or human development
  - Makes the app easier for contributors or users
  validations:
  required: true

* type: textarea
  id: user-experience
  attributes:
  label: User experience
  description: Describe how this should work from the user's perspective.
  placeholder: What would the user see, click, read, or experience?
  validations:
  required: false

* type: textarea
  id: possible-implementation
  attributes:
  label: Possible implementation
  description: If you have a technical idea, describe it here.
  placeholder: Mention relevant files, screens, APIs, flows, or implementation ideas if known.
  validations:
  required: false

* type: textarea
  id: alternatives
  attributes:
  label: Alternatives considered
  description: Are there other ways to solve this problem?
  placeholder: Briefly describe any simpler, safer, or more maintainable alternatives.
  validations:
  required: false

* type: checkboxes
  id: mission-alignment
  attributes:
  label: Mission alignment
  description: Select all that apply.
  options:
  - label: Supports reflection or learning
  - label: Supports safer communities
  - label: Reduces spam, abuse, or manipulation
  - label: Reduces addictive or engagement-driven behavior
  - label: Improves contributor experience
  - label: Improves accessibility or clarity
  - label: Supports teachers, seekers, groups, or communities

* type: textarea
  id: additional-context
  attributes:
  label: Additional context
  description: Add screenshots, examples, links, related issues, or other context.
  placeholder: Add anything else that helps explain the request.
  validations:
  required: false
